<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="720" rx="40" fill="#FCF7F0"/>
  <rect x="32" y="28" width="1336" height="664" rx="30" fill="#FFFDF9" stroke="#E8DCCB" stroke-width="2"/>
  <text x="80" y="108" fill="#2B231D" font-size="42" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">第一次投資，大致會經過這幾步</text>
  <text x="80" y="150" fill="#7A6859" font-size="24" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">流程先看懂，下單時就不容易慌。</text>

  <rect x="82" y="220" width="250" height="342" rx="28" fill="#FFF2E8" stroke="#EDC9AE" stroke-width="2"/>
  <circle cx="132" cy="278" r="28" fill="#F7D9C3"/>
  <text x="122" y="287" fill="#9B5D30" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">1</text>
  <text x="110" y="348" fill="#2B231D" font-size="27" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">準備可投資資金</text>
  <text x="110" y="398" fill="#6F5B4E" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">不是生活費，</text>
  <text x="110" y="430" fill="#6F5B4E" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">也不是緊急預備金。</text>

  <path d="M350 391 L376 391" stroke="#D5B592" stroke-width="8" stroke-linecap="round"/>

  <rect x="394" y="220" width="250" height="342" rx="28" fill="#FFF8E6" stroke="#E7D4A3" stroke-width="2"/>
  <circle cx="444" cy="278" r="28" fill="#F1E2A9"/>
  <text x="434" y="287" fill="#8E7230" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">2</text>
  <text x="422" y="348" fill="#2B231D" font-size="27" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">開立證券帳戶</text>
  <text x="422" y="398" fill="#6F5B4E" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">先有進入市場、</text>
  <text x="422" y="430" fill="#6F5B4E" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">送出指令的入口。</text>

  <path d="M662 391 L688 391" stroke="#D5B592" stroke-width="8" stroke-linecap="round"/>

  <rect x="706" y="220" width="250" height="342" rx="28" fill="#EEF4FF" stroke="#C8D7F0" stroke-width="2"/>
  <circle cx="756" cy="278" r="28" fill="#D7E4F8"/>
  <text x="746" y="287" fill="#5572A8" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">3</text>
  <text x="734" y="348" fill="#24304A" font-size="27" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">輸入下單條件</text>
  <text x="734" y="398" fill="#5B6880" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">決定商品、價格、</text>
  <text x="734" y="430" fill="#5B6880" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">數量，再送出指令。</text>

  <path d="M974 391 L1000 391" stroke="#D5B592" stroke-width="8" stroke-linecap="round"/>

  <rect x="1018" y="220" width="250" height="342" rx="28" fill="#EAF6EE" stroke="#C9E1D1" stroke-width="2"/>
  <circle cx="1068" cy="278" r="28" fill="#D4EAD9"/>
  <text x="1058" y="287" fill="#3F7D58" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">4</text>
  <text x="1046" y="348" fill="#203126" font-size="27" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">等待成交與觀察</text>
  <text x="1046" y="398" fill="#55725F" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">不一定會立刻成交，</text>
  <text x="1046" y="430" fill="#55725F" font-size="20" font-weight="500" font-family="Inter, Noto Sans TC, sans-serif">價格變動也是正常的。</text>
</svg>