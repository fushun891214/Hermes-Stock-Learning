<svg width="900" height="1180" viewBox="0 0 900 1180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手開始投入的判斷順序圖</title>
  <desc id="desc">用三張卡片說明新手開始投入前，先確認資金、再看波動承受度、最後決定投入節奏。</desc>
  <rect width="900" height="1180" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="1124" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="70" y="74" width="190" height="44" rx="22" fill="#E3F2EA"/>
  <text x="165" y="102" text-anchor="middle" fill="#2C8C67" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">開始前先看三步</text>

  <rect x="86" y="156" width="728" height="238" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="154" cy="226" r="36" fill="#FBECCF"/>
  <text x="154" y="238" text-anchor="middle" fill="#8F6627" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="206" y="220" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先確認：這筆錢真的準備好了嗎？</text>
  <text x="206" y="274" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不是生活費，也不是緊急預備金</text>
  <text x="206" y="318" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 投進去後，不會影響你這幾個月的生活</text>
  <text x="206" y="362" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 金額已經大致抓清楚，不是臨時起意</text>

  <path d="M450 394L450 470" stroke="#D8C5AB" stroke-width="14" stroke-linecap="round"/>
  <path d="M450 470L426 438H474L450 470Z" fill="#D8C5AB"/>

  <rect x="86" y="506" width="728" height="238" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="154" cy="576" r="36" fill="#FBECCF"/>
  <text x="154" y="588" text-anchor="middle" fill="#8F6627" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="206" y="570" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再看：你承不承受得住短期波動？</text>
  <text x="206" y="624" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 剛買完就下跌，你會不會很想立刻改決定</text>
  <text x="206" y="668" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 你比較能接受一次承受，還是慢慢分散壓力</text>
  <text x="206" y="712" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 能承受的節奏，才有機會做得久</text>

  <path d="M450 744L450 820" stroke="#D8C5AB" stroke-width="14" stroke-linecap="round"/>
  <path d="M450 820L426 788H474L450 820Z" fill="#D8C5AB"/>

  <rect x="86" y="856" width="728" height="230" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="154" cy="926" r="36" fill="#FFFFFF"/>
  <text x="154" y="938" text-anchor="middle" fill="#2C8C67" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="206" y="920" fill="#1F6C4E" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">最後才決定：一次投入還是分批投入</text>
  <text x="206" y="974" fill="#315649" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 已準備好一筆資金、能承受波動：可考慮一次投入</text>
  <text x="206" y="1018" fill="#315649" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 想先建立習慣、降低壓力：可考慮分批投入</text>
  <text x="206" y="1062" fill="#315649" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 沒有完美答案，先選做得下去的節奏</text>
</svg>
