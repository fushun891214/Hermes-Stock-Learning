<svg width="900" height="560" viewBox="0 0 900 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手賣出前先看這張</title>
  <desc id="desc">桌機版橫向流程圖，幫助新手先寫下賣出理由，再分辨是短期波動還是真正需要調整的變化。</desc>
  <rect width="900" height="560" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="504" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="76" y="72" width="188" height="38" rx="19" fill="#FFF0D8"/>
  <text x="170" y="97" text-anchor="middle" fill="#9A6827" font-size="19" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">想賣前先做這 3 步</text>

  <rect x="74" y="154" width="220" height="250" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="114" cy="200" r="22" fill="#FFF3DD"/>
  <text x="114" y="208" text-anchor="middle" fill="#9A6827" font-size="21" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="114" y="248" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先寫原因</text>
  <text x="114" y="292" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">不要只寫跌了或怕了</text>
  <text x="114" y="326" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">要說清楚是資金、</text>
  <text x="114" y="360" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">商品，還是規則變了</text>

  <text x="336" y="290" text-anchor="middle" fill="#C4AD8B" font-size="56" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">→</text>

  <rect x="364" y="154" width="220" height="250" rx="26" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="404" cy="200" r="22" fill="#FFFFFF"/>
  <text x="404" y="208" text-anchor="middle" fill="#2C8C67" font-size="21" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="404" y="248" fill="#1F6C4E" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再分清楚</text>
  <text x="404" y="292" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">只是短期波動不舒服，</text>
  <text x="404" y="326" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">還是用途、理解、</text>
  <text x="404" y="360" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">承受範圍真的改變了</text>

  <text x="626" y="290" text-anchor="middle" fill="#C4AD8B" font-size="56" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">→</text>

  <rect x="654" y="154" width="172" height="250" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="694" cy="200" r="22" fill="#FFF3DD"/>
  <text x="694" y="208" text-anchor="middle" fill="#9A6827" font-size="21" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="694" y="248" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">最後才決定</text>
  <text x="694" y="292" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">先不動</text>
  <text x="694" y="326" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">部分調整</text>
  <text x="694" y="360" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">或重新賣出</text>

  <rect x="74" y="444" width="752" height="56" rx="20" fill="#FFF5E8"/>
  <text x="450" y="478" text-anchor="middle" fill="#8F6627" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把原因說清楚，再做動作，會比只對價格反應更穩。</text>
</svg>
