<svg width="760" height="998" viewBox="0 0 760 998" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 12 熱門話題 checklist</title>
  <desc id="desc">手機版 checklist，用四個問題幫助新手判斷要不要跟進熱門題材。</desc>
  <rect width="760" height="998" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="942" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="234" height="38" rx="19" fill="#FFF3DD"/>
  <text x="189" y="97" text-anchor="middle" fill="#9A6827" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把理由寫清楚</text>
  <text x="72" y="154" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">想跟熱門題材前，</text>
  <text x="72" y="198" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先用這四題檢查自己</text>

  <rect x="72" y="234" width="616" height="134" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="278" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 如果不用「很多人在講」，</text>
  <text x="126" y="318" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">我還說得出它在投什麼嗎？</text>

  <rect x="72" y="390" width="616" height="170" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="434" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 如果我真的買了，</text>
  <text x="126" y="474" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">這種波動會不會讓我一直想看盤、</text>
  <text x="126" y="510" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">一直想改決定？</text>

  <rect x="72" y="582" width="616" height="174" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="626" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 這筆錢放進去，</text>
  <text x="126" y="666" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">會不會擠到我原本比較穩的投資安排？</text>
  <text x="126" y="702" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">先分清楚是研究，還是想情緒重押</text>

  <rect x="72" y="778" width="616" height="132" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="822" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 如果我現在先不買，</text>
  <text x="126" y="862" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">我能不能接受晚一點、看懂一點再決定？</text>

  <rect x="72" y="926" width="616" height="44" rx="22" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="380" y="955" text-anchor="middle" fill="#1F6C4E" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先寫清楚理由，再決定要不要跟。</text>
</svg>
