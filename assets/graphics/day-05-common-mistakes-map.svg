<svg width="900" height="1180" viewBox="0 0 900 1180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手一開始最常見的三個錯誤圖</title>
  <desc id="desc">用三張卡片整理新手剛開始投資時最常見的三個錯誤：用錯錢、跟熱度、亂改規則。</desc>
  <rect width="900" height="1180" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="1124" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="70" y="74" width="214" height="44" rx="22" fill="#FFF0D8"/>
  <text x="177" y="102" text-anchor="middle" fill="#9A6827" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先避開這三種錯</text>

  <rect x="86" y="156" width="728" height="246" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="154" cy="228" r="38" fill="#FFF3DD"/>
  <text x="154" y="240" text-anchor="middle" fill="#8F6627" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="206" y="218" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">把不該波動的錢拿去投資</text>
  <text x="206" y="272" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 生活費、緊急預備金，不適合直接丟進市場</text>
  <text x="206" y="316" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 問題不是跌多少，而是你會不會被迫提早退出</text>
  <text x="206" y="360" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 資金位置先站穩，後面節奏才撐得住</text>

  <path d="M450 402L450 478" stroke="#D8C5AB" stroke-width="14" stroke-linecap="round"/>
  <path d="M450 478L426 446H474L450 478Z" fill="#D8C5AB"/>

  <rect x="86" y="514" width="728" height="246" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="154" cy="586" r="38" fill="#E3F2EA"/>
  <text x="154" y="598" text-anchor="middle" fill="#2C8C67" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="206" y="576" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">把市場熱度，當成自己的判斷</text>
  <text x="206" y="630" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 很多人在講，不等於它現在就適合你</text>
  <text x="206" y="674" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不理解就買進，回檔時通常也抱不住</text>
  <text x="206" y="718" fill="#4A3F37" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 別人的推薦可以是起點，但不能直接變結論</text>

  <path d="M450 760L450 836" stroke="#D8C5AB" stroke-width="14" stroke-linecap="round"/>
  <path d="M450 836L426 804H474L450 836Z" fill="#D8C5AB"/>

  <rect x="86" y="872" width="728" height="228" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="154" cy="944" r="38" fill="#FFFFFF"/>
  <text x="154" y="956" text-anchor="middle" fill="#2C8C67" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="206" y="934" fill="#1F6C4E" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">一有波動，就一直改規則</text>
  <text x="206" y="988" fill="#315649" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 一跌就停、一漲就追，節奏很快會亂掉</text>
  <text x="206" y="1032" fill="#315649" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 規則不用複雜，但要先有，才能幫你擋情緒</text>
  <text x="206" y="1076" fill="#315649" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先求做得久，再慢慢優化方法</text>
</svg>
