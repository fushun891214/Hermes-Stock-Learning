<svg width="760" height="1160" viewBox="0 0 760 1160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">高配息先看三件事</title>
  <desc id="desc">手機版流程圖，提醒新手先看懂商品內容、確認自己是否真的需要現金流，再判斷能不能承受波動與規則。</desc>
  <rect width="760" height="1160" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="1104" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="228" height="38" rx="19" fill="#D9EFE4"/>
  <text x="186" y="97" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先看懂，再看配息</text>
  <text x="72" y="154" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">看到高配息時，</text>
  <text x="72" y="198" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先檢查這三件事</text>

  <rect x="72" y="240" width="616" height="188" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="116" cy="284" r="22" fill="#EAF5EF"/>
  <text x="116" y="291" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="152" y="288" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">我看得懂它在投什麼嗎</text>
  <text x="100" y="342" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先分清楚是個股、ETF，還是收益型商品</text>
  <text x="100" y="380" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不要只剩「配很多」這一個買進理由</text>

  <path d="M380 448V488" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M364 470L380 488L396 470" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="72" y="520" width="616" height="206" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="116" cy="564" r="22" fill="#EAF5EF"/>
  <text x="116" y="571" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="152" y="568" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">我是真的需要現金流嗎</text>
  <text x="100" y="622" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先分清楚，是生活需求，還是看到數字安心</text>
  <text x="100" y="660" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 如果目標是累積資產，更要先看整體適不適合</text>

  <path d="M380 746V786" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M364 768L380 786L396 768" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="72" y="818" width="616" height="214" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="116" cy="862" r="22" fill="#EAF5EF"/>
  <text x="116" y="869" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="152" y="866" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">這種波動和規則我跟得住嗎</text>
  <text x="100" y="920" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 有配息，價格一樣可能波動，也可能改變配法</text>
  <text x="100" y="958" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 如果一跌就慌，先研究或先小比例觀察</text>

  <rect x="72" y="1054" width="616" height="48" rx="24" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="380" y="1086" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先看懂商品，再決定要不要為配息買單。</text>
</svg>
