<svg width="760" height="920" viewBox="0 0 760 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 9 停扣前 checklist</title>
  <desc id="desc">手機版 checklist，用四個檢查問題幫助新手在下跌時，不要急著情緒停扣。</desc>
  <rect width="760" height="920" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="864" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="190" height="38" rx="19" fill="#FFF3DD"/>
  <text x="167" y="97" text-anchor="middle" fill="#9A6827" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">停扣前先寫下來</text>
  <text x="72" y="154" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先用這四題，</text>
  <text x="72" y="198" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">分清楚是在調整還是逃壓力</text>

  <rect x="72" y="230" width="616" height="104" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="274" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我想停扣，是因為資金變緊，還是帳面難看？</text>

  <rect x="72" y="356" width="616" height="104" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="400" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 現在的扣款金額，還是不是我跟得上的範圍？</text>

  <rect x="72" y="482" width="616" height="134" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="526" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我現在還能不能用白話說出：</text>
  <text x="126" y="566" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">它在投什麼、為什麼適合定期投入？</text>

  <rect x="72" y="638" width="616" height="104" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="682" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 如果今天停或降額，我準備用什麼條件重啟？</text>

  <rect x="72" y="774" width="616" height="78" rx="24" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="380" y="822" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把四題答清楚，再決定要不要停扣。</text>
</svg>
