<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手自我檢查圖卡</title>
  <desc id="desc">以五張 checklist 卡片整理 Day 1 結尾要自我回答的五個問題。</desc>
  <rect width="1200" height="620" rx="36" fill="#FFF9F2"/>

  <g transform="translate(84 84)">
    <rect width="320" height="150" rx="26" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <circle cx="42" cy="42" r="18" fill="#E2F2EA"/>
    <path d="M33 42L39 48L51 34" stroke="#2C8C67" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="52" fill="#231B16" font-size="26" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">我的投資目的</text>
    <text x="30" y="100" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">我是想長期累積資產、退休，</text>
    <text x="30" y="130" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">還是只是跟著別人說法在衝？</text>
  </g>

  <g transform="translate(440 84)">
    <rect width="320" height="150" rx="26" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <circle cx="42" cy="42" r="18" fill="#E2F2EA"/>
    <path d="M33 42L39 48L51 34" stroke="#2C8C67" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="52" fill="#231B16" font-size="26" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">我要買什麼</text>
    <text x="30" y="100" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">我比較適合先研究單一股票，</text>
    <text x="30" y="130" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">還是先從 ETF 建立習慣？</text>
  </g>

  <g transform="translate(796 84)">
    <rect width="320" height="150" rx="26" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <circle cx="42" cy="42" r="18" fill="#E2F2EA"/>
    <path d="M33 42L39 48L51 34" stroke="#2C8C67" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="52" fill="#231B16" font-size="26" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">每月投入多少</text>
    <text x="30" y="100" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">我能不能穩定投入，</text>
    <text x="30" y="130" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">而不是只靠一時衝動？</text>
  </g>

  <g transform="translate(262 284)">
    <rect width="320" height="150" rx="26" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <circle cx="42" cy="42" r="18" fill="#FFF3DD"/>
    <path d="M33 42L39 48L51 34" stroke="#A47026" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="52" fill="#231B16" font-size="26" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">跌 10% 我怎麼做</text>
    <text x="30" y="100" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">我會冷靜看待，還是一跌就受不了？</text>
    <text x="30" y="130" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">這會直接影響我的策略能不能做下去。</text>
  </g>

  <g transform="translate(618 284)">
    <rect width="320" height="150" rx="26" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <circle cx="42" cy="42" r="18" fill="#FFF3DD"/>
    <path d="M33 42L39 48L51 34" stroke="#A47026" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="52" fill="#231B16" font-size="26" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">這筆錢多久要用</text>
    <text x="30" y="100" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">如果一年內就要用到，</text>
    <text x="30" y="130" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">就要更小心能不能放進股市。</text>
  </g>

  <rect x="84" y="500" width="1032" height="78" rx="24" fill="#FFFDF9" stroke="#E7D8C5" stroke-width="2"/>
  <text x="600" y="548" text-anchor="middle" fill="#6C5D52" font-size="22" font-family="Inter, Noto Sans TC, sans-serif">做完這份檢查，你的重點不是立刻出手，而是開始知道什麼樣的投資方式比較適合你。</text>
</svg>