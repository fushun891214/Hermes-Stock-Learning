<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手自我檢查圖卡</title>
  <desc id="desc">用五張較大字的卡片整理 Day 1 結尾要自我回答的五個問題。</desc>
  <rect width="1200" height="900" rx="36" fill="#FFF9F2"/>

  <g transform="translate(72 72)">
    <rect width="500" height="190" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="36" y="70" fill="#231B16" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">1. 我的投資目的是什麼？</text>
    <text x="36" y="122" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我是想長期累積資產、退休，</text>
    <text x="36" y="162" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">還是只是跟著別人說法在衝？</text>
  </g>

  <g transform="translate(628 72)">
    <rect width="500" height="190" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="36" y="70" fill="#231B16" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">2. 我要買什麼？</text>
    <text x="36" y="122" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我是先研究單一股票，</text>
    <text x="36" y="162" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">還是先從 ETF 建立習慣？</text>
  </g>

  <g transform="translate(72 320)">
    <rect width="500" height="190" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="36" y="70" fill="#231B16" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">3. 每月投入多少？</text>
    <text x="36" y="122" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我能不能穩定投入，</text>
    <text x="36" y="162" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">而不是只靠一時衝動？</text>
  </g>

  <g transform="translate(628 320)">
    <rect width="500" height="190" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="36" y="70" fill="#231B16" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">4. 跌 10% 我怎麼做？</text>
    <text x="36" y="122" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我會冷靜看待，還是一跌就受不了？</text>
    <text x="36" y="162" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">這會直接影響策略能不能做下去。</text>
  </g>

  <g transform="translate(72 568)">
    <rect width="1056" height="190" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="36" y="70" fill="#231B16" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">5. 這筆錢多久要用？</text>
    <text x="36" y="122" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">如果一年內就要用到，就要更小心能不能把它放進股市。</text>
    <text x="36" y="162" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">先想清楚這五題，再開始投資會穩很多。</text>
  </g>
</svg>