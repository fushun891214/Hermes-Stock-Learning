<svg width="900" height="980" viewBox="0 0 900 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 6 檢查節奏 checklist</title>
  <desc id="desc">用三張核取方塊卡片與一個提醒區塊，幫助新手建立投資後的固定檢查節奏。</desc>
  <rect width="900" height="980" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="924" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="78" y="84" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="122" width="52" height="52" rx="14" fill="#E3F2EA"/>
  <path d="M130 148L143 161L156 135" stroke="#2C8C67" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="140" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先寫下：我平常最常因為什麼去看價格</text>
  <text x="198" y="182" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">分清楚你是在確認計畫，還是在確認自己有沒有買對。</text>

  <rect x="78" y="262" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="300" width="52" height="52" rx="14" fill="#FFF3DD"/>
  <path d="M130 326L143 339L156 313" stroke="#B17B2E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="318" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再決定：每週、每月各要固定看哪些項目</text>
  <text x="198" y="360" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">例如商品用途、投入節奏、資金位置，不要只看紅綠數字。</text>

  <rect x="78" y="440" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="478" width="52" height="52" rx="14" fill="#E3F2EA"/>
  <path d="M130 504L143 517L156 491" stroke="#2C8C67" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="496" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">下次看到波動，先回頭看規則，再決定要不要動</text>
  <text x="198" y="538" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">先問自己：真的有大變化，還是只是今天價格讓我不安？</text>

  <rect x="78" y="628" width="744" height="254" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="114" y="698" fill="#1F6C4E" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">檢查節奏的目的，不是讓你更常做動作</text>
  <text x="114" y="752" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">它真正的作用，是幫你把注意力放回商品、資金與規則，</text>
  <text x="114" y="792" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">讓每天的漲跌不要一直把你推離原本的計畫。</text>
</svg>
