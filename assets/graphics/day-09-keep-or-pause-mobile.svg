<svg width="760" height="980" viewBox="0 0 760 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">定期定額下跌時先判斷</title>
  <desc id="desc">手機版流程圖，幫助新手在市場下跌時分辨應該繼續扣款、調整金額，或先停下來重整。</desc>
  <rect width="760" height="980" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="924" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="196" height="38" rx="19" fill="#D9EFE4"/>
  <text x="170" y="97" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">下跌時先照順序看</text>
  <text x="72" y="154" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">定期定額遇到連跌，</text>
  <text x="72" y="198" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先看是不是規則真的變了</text>

  <rect x="72" y="246" width="616" height="178" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="116" cy="290" r="22" fill="#EAF5EF"/>
  <text x="116" y="297" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="152" y="294" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先看資金</text>
  <text x="96" y="344" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 生活支出有沒有變緊</text>
  <text x="96" y="384" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 現在金額還跟不跟得上</text>

  <path d="M380 438V486" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M366 470L380 486L394 470" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="72" y="510" width="616" height="206" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="116" cy="554" r="22" fill="#EAF5EF"/>
  <text x="116" y="561" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="152" y="558" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再看商品</text>
  <text x="96" y="608" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 你還講不講得清楚在扣什麼</text>
  <text x="96" y="648" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 這商品還適不適合長一點持有</text>
  <text x="96" y="690" fill="#8F6627" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">看不懂時，先回頭重看商品</text>

  <path d="M380 730V778" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M366 762L380 778L394 762" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="72" y="802" width="616" height="96" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="380" y="846" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">最後再看規則：決定繼續扣、降額，或短暫停下來重整</text>
</svg>
