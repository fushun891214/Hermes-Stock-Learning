<svg width="720" height="980" viewBox="0 0 720 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">開始投資後的看盤判斷圖</title>
  <desc id="desc">手機版圖卡，提醒新手開始投資後，不需要每天盯盤，而要改成固定節奏檢查。</desc>
  <rect width="720" height="980" rx="34" fill="#FFF8F1"/>
  <rect x="24" y="24" width="672" height="932" rx="28" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="56" y="60" width="210" height="40" rx="20" fill="#FFF0D8"/>
  <text x="161" y="86" text-anchor="middle" fill="#9A6827" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">開始後先看這張</text>

  <rect x="56" y="128" width="608" height="214" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="108" cy="184" r="24" fill="#FFF3DD"/>
  <text x="108" y="192" text-anchor="middle" fill="#9A6827" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="146" y="178" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">你現在學的是長期入門</text>
  <text x="88" y="226" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先建立商品、資金與節奏</text>
  <text x="88" y="262" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先學會遇到波動不要亂改規則</text>
  <text x="88" y="298" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不是每天追著價格做短線決定</text>

  <path d="M360 358L360 420" stroke="#D8C5AB" stroke-width="12" stroke-linecap="round"/>
  <path d="M360 420L338 392H382L360 420Z" fill="#D8C5AB"/>

  <rect x="56" y="456" width="608" height="214" rx="26" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="108" cy="512" r="24" fill="#FFFFFF"/>
  <text x="108" y="520" text-anchor="middle" fill="#2C8C67" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="146" y="506" fill="#1F6C4E" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">所以不用每天一直盯盤</text>
  <text x="88" y="554" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 漲跌每天都會出現</text>
  <text x="88" y="590" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不是每次波動都代表要動作</text>
  <text x="88" y="626" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 一直刷新，反而容易把情緒放大</text>

  <path d="M360 686L360 748" stroke="#D8C5AB" stroke-width="12" stroke-linecap="round"/>
  <path d="M360 748L338 720H382L360 748Z" fill="#D8C5AB"/>

  <rect x="56" y="784" width="608" height="128" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="360" y="838" text-anchor="middle" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">改成固定節奏檢查就好</text>
  <text x="360" y="882" text-anchor="middle" fill="#8F6627" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">看商品、看資金、看節奏，不要讓每天漲跌決定你的心情。</text>
</svg>
