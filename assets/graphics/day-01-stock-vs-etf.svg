<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">股票與 ETF 比較圖</title>
  <desc id="desc">用左右比較卡片說明股票與 ETF 的差異，幫助新手理解單一公司與一籃子標的的不同。</desc>
  <rect width="1200" height="760" rx="36" fill="#FFF9F2"/>
  <text x="84" y="98" fill="#2A211B" font-size="42" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">股票 vs ETF</text>
  <text x="84" y="138" fill="#776A61" font-size="22" font-family="Inter, Noto Sans TC, sans-serif">一個是押單一公司，一個是先買進一個組合。</text>

  <g transform="translate(84 190)">
    <rect width="482" height="480" rx="30" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <rect x="28" y="28" width="110" height="44" rx="22" fill="#FCE8DF"/>
    <text x="83" y="56" text-anchor="middle" fill="#BE6A3C" font-size="22" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">股票</text>
    <text x="32" y="124" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">你在買什麼？</text>
    <text x="32" y="164" fill="#5E5148" font-size="22" font-family="Inter, Noto Sans TC, sans-serif">你是在押單一公司未來會不會做得更好。</text>

    <rect x="32" y="206" width="418" height="78" rx="22" fill="#FFF7F3"/>
    <text x="56" y="250" fill="#231B16" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">判斷集中</text>
    <text x="56" y="278" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">主要看同一家公司會不會持續成長。</text>

    <rect x="32" y="300" width="418" height="78" rx="22" fill="#FFF7F3"/>
    <text x="56" y="344" fill="#231B16" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">波動較集中</text>
    <text x="56" y="372" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">公司一有狀況，價格可能更明顯起伏。</text>

    <rect x="32" y="394" width="418" height="78" rx="22" fill="#FFF7F3"/>
    <text x="56" y="438" fill="#231B16" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">適合誰？</text>
    <text x="56" y="466" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">願意研究公司、也能承受單一標的波動的人。</text>
  </g>

  <g transform="translate(634 190)">
    <rect width="482" height="480" rx="30" fill="#FFFFFF" stroke="#D7E9DF" stroke-width="2"/>
    <rect x="28" y="28" width="110" height="44" rx="22" fill="#E2F2EA"/>
    <text x="83" y="56" text-anchor="middle" fill="#2C8C67" font-size="22" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">ETF</text>
    <text x="32" y="124" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">你在買什麼？</text>
    <text x="32" y="164" fill="#5E5148" font-size="22" font-family="Inter, Noto Sans TC, sans-serif">你是在買進一籃子標的組成的投資組合。</text>

    <rect x="32" y="206" width="418" height="78" rx="22" fill="#F3FBF6"/>
    <text x="56" y="250" fill="#231B16" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">一次分散</text>
    <text x="56" y="278" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">不把判斷全壓在單一公司身上。</text>

    <rect x="32" y="300" width="418" height="78" rx="22" fill="#F3FBF6"/>
    <text x="56" y="344" fill="#231B16" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">決策壓力較低</text>
    <text x="56" y="372" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">對剛入門的人通常更容易先建立習慣。</text>

    <rect x="32" y="394" width="418" height="78" rx="22" fill="#F3FBF6"/>
    <text x="56" y="438" fill="#231B16" font-size="24" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">適合誰？</text>
    <text x="56" y="466" fill="#5E5148" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">想先穩穩開始、建立規律投入習慣的新手。</text>
  </g>

  <rect x="84" y="694" width="1032" height="38" rx="19" fill="#F8EFE3"/>
  <text x="600" y="720" text-anchor="middle" fill="#6C5D52" font-size="20" font-family="Inter, Noto Sans TC, sans-serif">先記住：股票不是比較差，ETF 也不是一定比較賺；重點是你現在適合從哪裡開始。</text>
</svg>