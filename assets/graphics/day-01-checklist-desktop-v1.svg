<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手自我檢查圖卡</title>
  <desc id="desc">桌機版橫向自我檢查圖卡，用五張較扁的卡片整理開始投資前要回答的問題。</desc>

  <rect x="24" y="24" width="1552" height="712" rx="36" fill="#FFFDF9" stroke="#E6D8C4" stroke-width="2"/>
  <text x="56" y="84" fill="#231B16" font-size="46" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">開始投資前，先回答這五題</text>
  <text x="56" y="128" fill="#6B5C50" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">先把這五題寫下來，你後面做決定時會穩很多。</text>

  <g transform="translate(56 176)">
    <rect width="456" height="220" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="28" y="64" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">1. 我的投資目的是什麼？</text>
    <text x="28" y="124" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我是想長期累積資產、準備退休，</text>
    <text x="28" y="164" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">還是只是跟著別人說法在衝？</text>
  </g>

  <g transform="translate(572 176)">
    <rect width="456" height="220" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="28" y="64" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">2. 我要買什麼？</text>
    <text x="28" y="124" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我是先研究單一股票，</text>
    <text x="28" y="164" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">還是先從 ETF 建立習慣？</text>
  </g>

  <g transform="translate(1088 176)">
    <rect width="456" height="220" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="28" y="64" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">3. 每月投入多少？</text>
    <text x="28" y="124" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我能不能穩定投入，</text>
    <text x="28" y="164" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">而不是只靠一時衝動？</text>
  </g>

  <g transform="translate(56 444)">
    <rect width="714" height="236" rx="28" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="28" y="68" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">4. 跌 10% 我會怎麼做？</text>
    <text x="28" y="132" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">我會冷靜看待，還是一跌就受不了？</text>
    <text x="28" y="172" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">這會直接影響策略能不能做下去。</text>
  </g>

  <g transform="translate(830 444)">
    <rect width="714" height="236" rx="28" fill="#FFFFFF" stroke="#D7E9DF" stroke-width="2"/>
    <text x="28" y="68" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">5. 這筆錢多久要用？</text>
    <text x="28" y="132" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">如果一年內就要用到，就要更小心</text>
    <text x="28" y="172" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">能不能把它放進股市。</text>
    <text x="28" y="212" fill="#2F7E5E" font-size="24" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">先想清楚這五題，再開始投資，整個節奏會穩很多。</text>
  </g>
</svg>
