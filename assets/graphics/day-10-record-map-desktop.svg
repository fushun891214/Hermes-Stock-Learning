<svg width="1180" height="560" viewBox="0 0 1180 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投資紀錄先抓三件事</title>
  <desc id="desc">桌機版流程圖，說明新手做投資紀錄時最值得先記的三件事。</desc>
  <rect width="1180" height="560" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="1124" height="504" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="82" y="70" width="196" height="38" rx="19" fill="#D9EFE4"/>
  <text x="180" y="95" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先記判斷，再看結果</text>
  <text x="82" y="154" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">投資紀錄先抓三件事：做了什麼、為什麼做、何時再回頭看</text>

  <rect x="82" y="214" width="286" height="196" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="126" cy="258" r="22" fill="#EAF5EF"/>
  <text x="126" y="265" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="162" y="262" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先寫動作</text>
  <text x="106" y="314" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 買進、加碼、停扣、調整金額</text>
  <text x="106" y="352" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先讓未來的自己知道你做了什麼</text>

  <rect x="447" y="214" width="286" height="196" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="491" cy="258" r="22" fill="#EAF5EF"/>
  <text x="491" y="265" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="527" y="262" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再寫理由</text>
  <text x="471" y="314" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 留一句白話判斷</text>
  <text x="471" y="352" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不要只留下後來的賺賠印象</text>

  <rect x="812" y="214" width="286" height="196" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="856" cy="258" r="22" fill="#EAF5EF"/>
  <text x="856" y="265" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="892" y="262" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">最後寫回看點</text>
  <text x="836" y="314" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 下個月再看，或等條件改變再重看</text>
  <text x="836" y="352" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 減少每次波動都臨時重想</text>

  <path d="M380 312H425" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M745 312H790" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M409 298L427 312L409 326" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M774 298L792 312L774 326" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="82" y="448" width="1016" height="42" rx="21" fill="#EAF5EF"/>
  <text x="590" y="476" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把決定留下來，下次面對波動時，才知道自己是在照計畫走，還是又被情緒帶走。</text>
</svg>
