<svg width="900" height="980" viewBox="0 0 900 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投入節奏 checklist</title>
  <desc id="desc">用三張核取方塊卡片提醒新手開始投入前，要先確認資金、節奏與壓力承受度。</desc>
  <rect width="900" height="980" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="924" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="78" y="84" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="122" width="52" height="52" rx="14" fill="#E3F2EA"/>
  <path d="M130 148L143 161L156 135" stroke="#2C8C67" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="140" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先寫清楚：這筆錢從哪裡來</text>
  <text x="198" y="182" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">是已經準備好的資金，還是未來慢慢存下來的錢？</text>

  <rect x="78" y="262" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="300" width="52" height="52" rx="14" fill="#FFF3DD"/>
  <path d="M130 326L143 339L156 313" stroke="#B17B2E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="318" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先決定一條簡單規則</text>
  <text x="198" y="360" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">例如分 3 次投入，或每月固定一天檢查與執行。</text>

  <rect x="78" y="440" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="478" width="52" height="52" rx="14" fill="#E3F2EA"/>
  <path d="M130 504L143 517L156 491" stroke="#2C8C67" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="496" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先用小一點的金額觀察自己</text>
  <text x="198" y="538" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">看自己是能接受波動，還是一跌就想改規則。</text>

  <rect x="78" y="628" width="744" height="254" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="114" y="698" fill="#1F6C4E" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先有節奏，比先追完美答案更重要</text>
  <text x="114" y="752" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">對新手來說，能持續做下去的方式，通常比一次猜中最好的</text>
  <text x="114" y="792" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">進場時間更重要。先開始、先觀察，再慢慢調整，節奏就會</text>
  <text x="114" y="832" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">越來越清楚。</text>
</svg>
