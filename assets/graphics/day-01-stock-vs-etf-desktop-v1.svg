<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">股票與 ETF 比較圖</title>
  <desc id="desc">桌機版橫向比較圖，左右兩欄說明股票與 ETF 的差異。</desc>

  <rect x="24" y="24" width="1552" height="592" rx="36" fill="#FFFDF9" stroke="#E6D8C4" stroke-width="2"/>
  <text x="56" y="84" fill="#231B16" font-size="46" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">股票和 ETF，差別先看這兩件事</text>
  <text x="56" y="128" fill="#6B5C50" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">不是誰一定比較好，而是你現在適合從哪一種開始。</text>

  <g transform="translate(56 170)">
    <rect width="720" height="390" rx="30" fill="#FFFFFF" stroke="#F0D7C9" stroke-width="2"/>
    <rect x="32" y="30" width="138" height="56" rx="28" fill="#FCE8DF"/>
    <text x="101" y="66" text-anchor="middle" fill="#BE6A3C" font-size="28" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">股票</text>
    <text x="32" y="146" fill="#231B16" font-size="46" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">你在押單一公司</text>
    <text x="32" y="218" fill="#5E5148" font-size="30" font-family="Inter, Noto Sans TC, sans-serif">• 判斷集中：主要看這家公司會不會持續成長</text>
    <text x="32" y="270" fill="#5E5148" font-size="30" font-family="Inter, Noto Sans TC, sans-serif">• 波動較集中：一有狀況，價格可能更明顯起伏</text>
    <text x="32" y="322" fill="#5E5148" font-size="30" font-family="Inter, Noto Sans TC, sans-serif">• 適合願意研究公司，也能承受單一標的波動的人</text>
  </g>

  <g transform="translate(824 170)">
    <rect width="720" height="390" rx="30" fill="#FFFFFF" stroke="#D7E9DF" stroke-width="2"/>
    <rect x="32" y="30" width="138" height="56" rx="28" fill="#E2F2EA"/>
    <text x="101" y="66" text-anchor="middle" fill="#2C8C67" font-size="28" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">ETF</text>
    <text x="32" y="146" fill="#231B16" font-size="46" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">你在買一個組合</text>
    <text x="32" y="218" fill="#5E5148" font-size="30" font-family="Inter, Noto Sans TC, sans-serif">• 一次分散：不把判斷全壓在單一公司身上</text>
    <text x="32" y="270" fill="#5E5148" font-size="30" font-family="Inter, Noto Sans TC, sans-serif">• 決策壓力較低：通常更適合剛開始建立習慣的人</text>
    <text x="32" y="322" fill="#5E5148" font-size="30" font-family="Inter, Noto Sans TC, sans-serif">• 重點不是誰比較強，而是你現在適合從哪裡開始</text>
  </g>
</svg>
