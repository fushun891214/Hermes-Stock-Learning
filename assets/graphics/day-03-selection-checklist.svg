<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">Day 3 商品選擇 checklist</title>
  <desc id="desc">提醒新手在第一次選投資商品前，先回答四個判斷問題。</desc>
  <rect width="860" height="420" rx="30" fill="#fffaf4"/>
  <rect x="20" y="20" width="820" height="380" rx="26" fill="none" stroke="#e7d9c6"/>
  <text x="64" y="64" font-size="29" font-weight="800" fill="#2a221d">第一次選商品前，先回答這四題</text>
  <text x="64" y="94" font-size="17" fill="#6f6258">如果還答不出來，先研究，不要急著買</text>

  <g transform="translate(56 126)">
    <rect width="748" height="60" rx="18" fill="#f2fbf6" stroke="#cde3d5"/>
    <circle cx="32" cy="30" r="14" fill="#2c8c67"/>
    <path d="M25 30 l5 5 l10 -12" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="37" font-size="21" font-weight="700" fill="#2a221d">1. 它是 ETF，還是單一股票？</text>
  </g>

  <g transform="translate(56 198)">
    <rect width="748" height="60" rx="18" fill="#fff9ef" stroke="#ecdab6"/>
    <circle cx="32" cy="30" r="14" fill="#f0b862"/>
    <path d="M25 30 l5 5 l10 -12" fill="none" stroke="#6a4b18" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="37" font-size="21" font-weight="700" fill="#2a221d">2. 它主要投什麼，或主要靠什麼賺錢？</text>
  </g>

  <g transform="translate(56 270)">
    <rect width="748" height="60" rx="18" fill="#f2fbf6" stroke="#cde3d5"/>
    <circle cx="32" cy="30" r="14" fill="#2c8c67"/>
    <path d="M25 30 l5 5 l10 -12" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="37" font-size="21" font-weight="700" fill="#2a221d">3. 它的波動，主要來自市場、產業，還是單一公司？</text>
  </g>

  <g transform="translate(56 342)">
    <rect width="748" height="60" rx="18" fill="#fff9ef" stroke="#ecdab6"/>
    <circle cx="32" cy="30" r="14" fill="#f0b862"/>
    <path d="M25 30 l5 5 l10 -12" fill="none" stroke="#6a4b18" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="37" font-size="21" font-weight="700" fill="#2a221d">4. 如果它下跌，我知不知道自己當初為什麼買它？</text>
  </g>
</svg>