<svg width="760" height="960" viewBox="0 0 760 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投資檢查先分成三種節奏</title>
  <desc id="desc">手機版圖卡，說明新手可用日常確認、固定回看、事件檢查三種節奏管理投資檢查。</desc>
  <rect width="760" height="960" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="904" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="228" height="38" rx="19" fill="#D9EFE4"/>
  <text x="186" y="97" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先分節奏，再做判斷</text>
  <text x="72" y="154" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">投資檢查不用天天重跑，</text>
  <text x="72" y="198" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先分成這三種節奏就夠</text>

  <rect x="72" y="240" width="616" height="154" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="122" cy="290" r="24" fill="#EAF5EF"/>
  <text x="122" y="298" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="160" y="288" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">日常看一眼</text>
  <text x="160" y="330" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">確認扣款、下單或設定沒有明顯問題，</text>
  <text x="160" y="366" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">但先不要因為小波動立刻改計畫</text>

  <rect x="72" y="420" width="616" height="188" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="122" cy="472" r="24" fill="#EAF5EF"/>
  <text x="122" y="480" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="160" y="470" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">固定回看</text>
  <text x="160" y="512" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">每月或每季重看一次資金、商品理解</text>
  <text x="160" y="548" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">和投入規則，整理方向而不是追每天漲跌</text>

  <rect x="72" y="634" width="616" height="184" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="122" cy="686" r="24" fill="#EAF5EF"/>
  <text x="122" y="694" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="160" y="684" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">事件檢查</text>
  <text x="160" y="726" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">只有當生活資金、商品理解或大動作</text>
  <text x="160" y="762" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">真的改變時，再臨時回頭重看</text>

  <rect x="72" y="848" width="616" height="52" rx="24" fill="#FFF3DD" stroke="#E8DCC9" stroke-width="2"/>
  <text x="380" y="881" text-anchor="middle" fill="#9A6827" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">不是不能看，而是不要每次看都想立刻改。</text>
</svg>
