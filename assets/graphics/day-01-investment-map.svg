<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投資學習流程圖</title>
  <desc id="desc">用四個步驟說明投資前應先想目的，再選商品、看風險，最後才開始投入。</desc>
  <rect width="1200" height="860" rx="36" fill="#FFF9F2"/>
  <rect x="48" y="48" width="1104" height="764" rx="30" fill="#F8EFE3" stroke="#E3D3BE" stroke-width="2"/>

  <g transform="translate(92 112)">
    <rect width="442" height="230" rx="30" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="64" cy="62" r="30" fill="#E2F2EA"/>
    <text x="64" y="73" text-anchor="middle" fill="#2C8C67" font-size="30" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">1</text>
    <text x="112" y="78" fill="#231B16" font-size="40" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">先想目的</text>
    <text x="42" y="130" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">這筆錢是拿來累積資產、退休，</text>
    <text x="42" y="170" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">還是建立理財習慣？</text>
    <text x="42" y="210" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">先知道目的，後面才不會亂做。</text>
  </g>

  <g transform="translate(666 112)">
    <rect width="442" height="230" rx="30" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="64" cy="62" r="30" fill="#FFF3DD"/>
    <text x="64" y="73" text-anchor="middle" fill="#A47026" font-size="30" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">2</text>
    <text x="112" y="78" fill="#231B16" font-size="40" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">選商品</text>
    <text x="42" y="130" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">你是在押單一公司，</text>
    <text x="42" y="170" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">還是先從 ETF 這種組合型商品開始？</text>
    <text x="42" y="210" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">先分清楚，再決定怎麼開始。</text>
  </g>

  <g transform="translate(92 390)">
    <rect width="442" height="230" rx="30" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="64" cy="62" r="30" fill="#FCE8DF"/>
    <text x="64" y="73" text-anchor="middle" fill="#BE6A3C" font-size="30" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">3</text>
    <text x="112" y="78" fill="#231B16" font-size="40" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">看風險</text>
    <text x="42" y="130" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">如果中間下跌 10%～20%，</text>
    <text x="42" y="170" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">你還拿得住嗎？</text>
    <text x="42" y="210" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">能承受，才是真的適合你。</text>
  </g>

  <g transform="translate(666 390)">
    <rect width="442" height="230" rx="30" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="64" cy="62" r="30" fill="#E2F2EA"/>
    <text x="64" y="73" text-anchor="middle" fill="#2C8C67" font-size="30" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">4</text>
    <text x="112" y="78" fill="#231B16" font-size="40" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">再投入</text>
    <text x="42" y="130" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">順序清楚之後，</text>
    <text x="42" y="170" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">才比較不會一跌就亂改策略。</text>
    <text x="42" y="210" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">先穩，再開始投資。</text>
  </g>

  <rect x="92" y="670" width="1016" height="94" rx="28" fill="#FFFDF9" stroke="#E6D8C4" stroke-width="2"/>
  <text x="132" y="726" fill="#2A211B" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">重點提醒：先把順序走對，再開始投入。</text>
</svg>