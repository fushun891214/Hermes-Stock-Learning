<svg width="980" height="620" viewBox="0 0 980 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">固定檢查與情緒重看比較圖</title>
  <desc id="desc">比較有節奏的投資檢查與被市場情緒拉著走的差別。</desc>
  <rect width="980" height="620" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="924" height="564" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="364" height="430" rx="30" fill="#FFFFFF" stroke="#CFE7DA" stroke-width="2"/>
  <rect x="98" y="100" width="148" height="34" rx="17" fill="#EAF5EF"/>
  <text x="172" y="123" text-anchor="middle" fill="#1F6C4E" font-size="18" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">固定檢查</text>
  <text x="98" y="176" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先看節奏，再看動作</text>
  <text x="98" y="236" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 到了每月或每季的回看點才整理</text>
  <text x="98" y="276" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先問資金、商品理解、規則有沒有變</text>
  <text x="98" y="316" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 沒有明顯改變，就不因小波動亂調整</text>
  <rect x="98" y="360" width="312" height="94" rx="22" fill="#F5FBF7"/>
  <text x="120" y="402" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">結果：</text>
  <text x="120" y="438" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">比較守得住原本計畫，判斷也更一致</text>

  <rect x="544" y="72" width="364" height="430" rx="30" fill="#FFFFFF" stroke="#F0D7CF" stroke-width="2"/>
  <rect x="570" y="100" width="148" height="34" rx="17" fill="#FBE7E1"/>
  <text x="644" y="123" text-anchor="middle" fill="#B85C3A" font-size="18" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">情緒重看</text>
  <text x="570" y="176" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">市場一動，就想全部重算</text>
  <text x="570" y="236" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 漲跌、新聞、群組討論一來就打開帳戶</text>
  <text x="570" y="276" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 還沒看清楚條件有沒有變，就想先改</text>
  <text x="570" y="316" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 每次都像從頭再做一次決定</text>
  <rect x="570" y="360" width="312" height="94" rx="22" fill="#FFF5F1"/>
  <text x="592" y="402" fill="#B85C3A" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">結果：</text>
  <text x="592" y="438" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">看很多次，卻更容易越看越亂、越改越慌</text>

  <rect x="72" y="528" width="836" height="42" rx="21" fill="#FFF3DD"/>
  <text x="490" y="556" text-anchor="middle" fill="#9A6827" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先問「是不是到了該檢查的時間」，通常比先問「今天跌了多少」更有幫助。</text>
</svg>
