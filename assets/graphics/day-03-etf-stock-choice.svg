<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" role="img" aria-labelledby="title desc">
  <title id="title">ETF 與單一股票起步判斷圖</title>
  <desc id="desc">比較新手先從 ETF 開始與研究單一股票時，要面對的不同重點。</desc>
  <rect width="860" height="500" rx="30" fill="#fbf5ed"/>
  <rect x="20" y="20" width="820" height="460" rx="26" fill="none" stroke="#e7d9c6"/>
  <text x="430" y="56" text-anchor="middle" font-size="28" font-weight="800" fill="#2a221d">新手起步時，兩種方向差在哪裡？</text>

  <rect x="60" y="94" width="340" height="338" rx="28" fill="#f3fbf6" stroke="#c8e2d4"/>
  <text x="230" y="132" text-anchor="middle" font-size="27" font-weight="800" fill="#216d50">先從 ETF 開始</text>
  <text x="230" y="164" text-anchor="middle" font-size="17" fill="#4d433c">重點是先建立節奏與分散概念</text>
  <rect x="92" y="194" width="276" height="62" rx="18" fill="#ffffff" stroke="#d7eadf"/>
  <text x="110" y="220" font-size="17" font-weight="700" fill="#216d50">比較適合</text>
  <text x="110" y="244" font-size="17" fill="#3d342f">想先規律投入、降低單一公司波動的人</text>
  <rect x="92" y="272" width="276" height="62" rx="18" fill="#ffffff" stroke="#d7eadf"/>
  <text x="110" y="298" font-size="17" font-weight="700" fill="#216d50">先看什麼</text>
  <text x="110" y="322" font-size="17" fill="#3d342f">追蹤什麼市場、分散度夠不夠、波動從哪來</text>
  <rect x="92" y="350" width="276" height="62" rx="18" fill="#ffffff" stroke="#d7eadf"/>
  <text x="110" y="376" font-size="17" font-weight="700" fill="#216d50">常見好處</text>
  <text x="110" y="400" font-size="17" fill="#3d342f">比較容易先活下來，再慢慢把觀念補完整</text>

  <rect x="460" y="94" width="340" height="338" rx="28" fill="#fff8ee" stroke="#ebd8b4"/>
  <text x="630" y="132" text-anchor="middle" font-size="27" font-weight="800" fill="#8f6627">研究單一股票</text>
  <text x="630" y="164" text-anchor="middle" font-size="17" fill="#5a4a38">重點是理解公司本身，而不是只看名氣</text>
  <rect x="492" y="194" width="276" height="62" rx="18" fill="#ffffff" stroke="#efdfc4"/>
  <text x="510" y="220" font-size="17" font-weight="700" fill="#8f6627">比較適合</text>
  <text x="510" y="244" font-size="17" fill="#3d342f">願意研究公司、產業，並接受較大波動的人</text>
  <rect x="492" y="272" width="276" height="62" rx="18" fill="#ffffff" stroke="#efdfc4"/>
  <text x="510" y="298" font-size="17" font-weight="700" fill="#8f6627">先看什麼</text>
  <text x="510" y="322" font-size="17" fill="#3d342f">公司靠什麼賺錢、景氣變化如何影響它</text>
  <rect x="492" y="350" width="276" height="62" rx="18" fill="#ffffff" stroke="#efdfc4"/>
  <text x="510" y="376" font-size="17" font-weight="700" fill="#8f6627">常見風險</text>
  <text x="510" y="400" font-size="17" fill="#3d342f">只因為熱門就買，跌了卻不知道自己在抱什麼</text>

  <text x="430" y="463" text-anchor="middle" font-size="18" font-weight="700" fill="#6f6258">先找適合自己的起點，比先追最熱的商品更重要</text>
</svg>