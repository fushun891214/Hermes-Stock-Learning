<svg width="720" height="980" viewBox="0 0 720 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">新手賣出前先看這張</title>
  <desc id="desc">手機版流程圖，幫助台股新手先分清楚是短期波動，還是真的需要重新檢查資金、商品與規則。</desc>
  <rect width="720" height="980" rx="34" fill="#FFF8F1"/>
  <rect x="24" y="24" width="672" height="932" rx="28" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="56" y="60" width="210" height="40" rx="20" fill="#FFF0D8"/>
  <text x="161" y="86" text-anchor="middle" fill="#9A6827" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">想賣前先看</text>

  <rect x="56" y="128" width="608" height="194" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="108" cy="184" r="24" fill="#FFF3DD"/>
  <text x="108" y="192" text-anchor="middle" fill="#9A6827" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="146" y="178" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先寫下你想賣的理由</text>
  <text x="88" y="226" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不要只寫「跌了」「有點怕」</text>
  <text x="88" y="262" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先說清楚是資金、商品還是規則變了</text>

  <path d="M360 338L360 400" stroke="#D8C5AB" stroke-width="12" stroke-linecap="round"/>
  <path d="M360 400L338 372H382L360 400Z" fill="#D8C5AB"/>

  <rect x="56" y="436" width="608" height="214" rx="26" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="108" cy="492" r="24" fill="#FFFFFF"/>
  <text x="108" y="500" text-anchor="middle" fill="#2C8C67" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="146" y="486" fill="#1F6C4E" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先分清楚：是波動，還是真的變了</text>
  <text x="88" y="534" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 只是不舒服：先回頭看原本計畫</text>
  <text x="88" y="570" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 用途改變：重看這筆錢還能不能持有</text>
  <text x="88" y="606" fill="#315649" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 看不懂商品：先停下來重新理解</text>

  <path d="M360 666L360 728" stroke="#D8C5AB" stroke-width="12" stroke-linecap="round"/>
  <path d="M360 728L338 700H382L360 728Z" fill="#D8C5AB"/>

  <rect x="56" y="764" width="608" height="148" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="360" y="818" text-anchor="middle" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">最後才決定：先不動、部分調整或賣出</text>
  <text x="360" y="862" text-anchor="middle" fill="#8F6627" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把原因說清楚，再做動作，會比只對價格反應更穩。</text>
</svg>
