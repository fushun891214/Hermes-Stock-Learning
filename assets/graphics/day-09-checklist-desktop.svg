<svg width="1180" height="540" viewBox="0 0 1180 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 9 停扣前 checklist</title>
  <desc id="desc">桌機版 checklist，用四個問題幫助新手在下跌時先重看規則，而不是急著停扣。</desc>
  <rect width="1180" height="540" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="1124" height="484" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="74" y="62" width="190" height="38" rx="19" fill="#FFF3DD"/>
  <text x="169" y="87" text-anchor="middle" fill="#9A6827" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">停扣前先寫下來</text>
  <text x="74" y="142" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先用這四題，分清楚是在調整還是在逃壓力</text>

  <rect x="74" y="188" width="478" height="92" rx="22" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="104" y="242" fill="#231B16" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我想停扣，是因為資金變緊，還是帳面難看？</text>

  <rect x="628" y="188" width="478" height="92" rx="22" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="658" y="242" fill="#231B16" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 現在的扣款金額，還是不是我跟得上的範圍？</text>

  <rect x="74" y="302" width="478" height="110" rx="22" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="104" y="350" fill="#231B16" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我還能不能用白話說出：</text>
  <text x="130" y="386" fill="#4A3F37" font-size="21" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">它在投什麼、為什麼適合定期投入？</text>

  <rect x="628" y="302" width="478" height="110" rx="22" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="658" y="350" fill="#231B16" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 如果今天停或降額，我準備用什麼條件重啟？</text>

  <rect x="74" y="440" width="1032" height="42" rx="21" fill="#EAF5EF"/>
  <text x="590" y="468" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把四題答清楚，再決定要不要停扣或調整金額。</text>
</svg>
