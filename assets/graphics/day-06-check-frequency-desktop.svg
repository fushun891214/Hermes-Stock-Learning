<svg width="900" height="920" viewBox="0 0 900 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">開始投資後的看盤判斷圖</title>
  <desc id="desc">比較每天一直盯盤與固定節奏檢查的差別，幫助新手判斷開始後該把注意力放在哪裡。</desc>
  <rect width="900" height="920" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="864" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="74" width="220" height="44" rx="22" fill="#FFF0D8"/>
  <text x="182" y="102" text-anchor="middle" fill="#9A6827" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">開始後先看這張</text>

  <rect x="86" y="156" width="728" height="194" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="148" cy="220" r="30" fill="#FFF3DD"/>
  <text x="148" y="230" text-anchor="middle" fill="#9A6827" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="196" y="214" fill="#231B16" font-size="31" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">你現在在學的是長期入門，不是每天追短線</text>
  <text x="118" y="268" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先建立投資習慣</text>
  <text x="118" y="306" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先學會商品、資金與節奏</text>
  <text x="118" y="344" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先練習在波動裡不要亂改規則</text>

  <path d="M450 372L450 438" stroke="#D8C5AB" stroke-width="14" stroke-linecap="round"/>
  <path d="M450 438L426 406H474L450 438Z" fill="#D8C5AB"/>

  <rect x="86" y="470" width="728" height="194" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="148" cy="534" r="30" fill="#FFFFFF"/>
  <text x="148" y="544" text-anchor="middle" fill="#2C8C67" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="196" y="528" fill="#1F6C4E" font-size="31" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">所以不用每天一直盯著價格</text>
  <text x="118" y="582" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 漲跌每天都會出現，但不是每次都要動作</text>
  <text x="118" y="620" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 一直刷新，容易把情緒放大，反而更亂</text>
  <text x="118" y="658" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 重點不是完全不看，而是不要被每天漲跌帶著跑</text>

  <path d="M450 686L450 752" stroke="#D8C5AB" stroke-width="14" stroke-linecap="round"/>
  <path d="M450 752L426 720H474L450 752Z" fill="#D8C5AB"/>

  <rect x="86" y="784" width="728" height="84" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="450" y="838" text-anchor="middle" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">把看盤，改成有規則的檢查就好</text>
</svg>
