<svg width="900" height="980" viewBox="0 0 900 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 5 常見錯誤避開 checklist</title>
  <desc id="desc">用三張核取方塊卡片與一個提醒區塊，幫助新手檢查自己是否避開常見錯誤。</desc>
  <rect width="900" height="980" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="844" height="924" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="78" y="84" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="122" width="52" height="52" rx="14" fill="#E3F2EA"/>
  <path d="M130 148L143 161L156 135" stroke="#2C8C67" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="140" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先確認：投入的錢有沒有混到生活用途</text>
  <text x="198" y="182" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">如果裡面有生活費或緊急預備金，就先分開，不要硬投。</text>

  <rect x="78" y="262" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="300" width="52" height="52" rx="14" fill="#FFF3DD"/>
  <path d="M130 326L143 339L156 313" stroke="#B17B2E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="318" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再確認：我是真的看得懂，不是只看到熱度</text>
  <text x="198" y="360" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">買之前，要能用白話說出它在投什麼、為什麼適合自己。</text>

  <rect x="78" y="440" width="744" height="132" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <rect x="116" y="478" width="52" height="52" rx="14" fill="#E3F2EA"/>
  <path d="M130 504L143 517L156 491" stroke="#2C8C67" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="496" fill="#231B16" font-size="30" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">最後確認：有沒有一條簡單規則幫我擋情緒</text>
  <text x="198" y="538" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">例如固定檢查時間、固定金額，或先分幾次投入。</text>

  <rect x="78" y="628" width="744" height="254" rx="28" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="114" y="698" fill="#1F6C4E" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先避開明顯的錯，後面才有空間慢慢變穩</text>
  <text x="114" y="752" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">對新手來說，先把資金、理解與規則站穩，比急著證明自己每次</text>
  <text x="114" y="792" fill="#315649" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">都判斷正確更重要。先不要亂掉，之後才有機會慢慢做得更好。</text>
</svg>
