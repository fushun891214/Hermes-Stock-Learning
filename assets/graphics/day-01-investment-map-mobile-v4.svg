<svg width="1200" height="1660" viewBox="0 0 1200 1660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投資學習流程圖</title>
  <desc id="desc">用四張單欄大卡片說明新手投資前應先想目的、選商品、看風險，再開始投入。</desc>

  <g transform="translate(32 32)">
    <rect width="1136" height="332" rx="34" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="82" cy="82" r="42" fill="#E2F2EA"/>
    <text x="82" y="96" text-anchor="middle" fill="#2C8C67" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">1</text>
    <text x="148" y="94" fill="#231B16" font-size="54" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">先想目的</text>
    <text x="56" y="172" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">這筆錢是拿來累積資產、準備退休，</text>
    <text x="56" y="224" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">還是只是想開始建立理財習慣？</text>
    <text x="56" y="286" fill="#2F7E5E" font-size="32" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">先知道為什麼投資，之後市場波動時才不容易亂改方向。</text>
  </g>

  <g transform="translate(32 428)">
    <rect width="1136" height="332" rx="34" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="82" cy="82" r="42" fill="#FFF3DD"/>
    <text x="82" y="96" text-anchor="middle" fill="#A47026" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">2</text>
    <text x="148" y="94" fill="#231B16" font-size="54" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">選商品</text>
    <text x="56" y="172" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">你是在押單一公司，</text>
    <text x="56" y="224" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">還是先從 ETF 這種一籃子商品開始？</text>
    <text x="56" y="286" fill="#8C6425" font-size="32" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">先分清楚你買的是什麼，再決定怎麼開始，會更穩。</text>
  </g>

  <g transform="translate(32 824)">
    <rect width="1136" height="332" rx="34" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="82" cy="82" r="42" fill="#FCE8DF"/>
    <text x="82" y="96" text-anchor="middle" fill="#BE6A3C" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">3</text>
    <text x="148" y="94" fill="#231B16" font-size="54" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">看風險</text>
    <text x="56" y="172" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">如果中間下跌 10% 到 20%，</text>
    <text x="56" y="224" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">你還拿得住嗎？睡得著嗎？</text>
    <text x="56" y="286" fill="#A45B33" font-size="32" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">能承受的波動，才是真正適合你的投資方式。</text>
  </g>

  <g transform="translate(32 1220)">
    <rect width="1136" height="332" rx="34" fill="#FFFFFF" stroke="#E6D8C4" stroke-width="2"/>
    <circle cx="82" cy="82" r="42" fill="#E2F2EA"/>
    <text x="82" y="96" text-anchor="middle" fill="#2C8C67" font-size="38" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">4</text>
    <text x="148" y="94" fill="#231B16" font-size="54" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">再投入</text>
    <text x="56" y="172" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">順序清楚之後，</text>
    <text x="56" y="224" fill="#5E5148" font-size="38" font-family="Inter, Noto Sans TC, sans-serif">才比較不會一跌就懷疑自己、亂改策略。</text>
    <text x="56" y="286" fill="#2F7E5E" font-size="32" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">真正穩的開始，不是衝得快，而是做得久。</text>
  </g>
</svg>
