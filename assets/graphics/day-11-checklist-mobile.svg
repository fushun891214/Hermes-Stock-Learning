<svg width="760" height="996" viewBox="0 0 760 996" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 11 檢查節奏 checklist</title>
  <desc id="desc">手機版 checklist，用四個問題幫助新手建立投資檢查節奏。</desc>
  <rect width="760" height="996" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="940" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="222" height="38" rx="19" fill="#FFF3DD"/>
  <text x="183" y="97" text-anchor="middle" fill="#9A6827" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先訂回看節奏</text>
  <text x="72" y="154" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">每次想一直打開帳戶前，</text>
  <text x="72" y="198" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先用這四題檢查自己</text>

  <rect x="72" y="234" width="616" height="128" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="278" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我最常在什麼情況下，</text>
  <text x="126" y="318" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">忍不住一直打開帳戶或重看決定？</text>

  <rect x="72" y="384" width="616" height="132" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="428" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我的固定回看，準備放在</text>
  <text x="126" y="468" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">每月、每季，還是另一個守得住的時間點？</text>

  <rect x="72" y="538" width="616" height="154" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="582" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 我每次回看時，</text>
  <text x="126" y="622" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">最需要先確認的三件事是什麼？</text>
  <text x="126" y="658" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">先寫下資金、商品理解、投入規則</text>

  <rect x="72" y="714" width="616" height="138" rx="24" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <text x="100" y="758" fill="#231B16" font-size="25" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">□ 什麼情況出現時，</text>
  <text x="126" y="798" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">我才要在固定時間外臨時檢查一次？</text>

  <rect x="72" y="884" width="616" height="54" rx="24" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <text x="380" y="918" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先訂節奏，再打開帳戶，通常會更穩。</text>
</svg>
