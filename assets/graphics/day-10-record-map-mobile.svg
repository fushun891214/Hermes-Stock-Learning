<svg width="760" height="920" viewBox="0 0 760 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投資紀錄先抓三件事</title>
  <desc id="desc">手機版圖卡，幫助新手理解投資紀錄最重要的三個欄位：做了什麼、為什麼做、何時再回頭看。</desc>
  <rect width="760" height="920" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="864" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="72" width="190" height="38" rx="19" fill="#D9EFE4"/>
  <text x="167" y="97" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先記判斷，再看結果</text>
  <text x="72" y="154" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">投資紀錄不用很重，</text>
  <text x="72" y="198" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先抓住這三件事就夠</text>

  <rect x="72" y="244" width="616" height="136" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="120" cy="294" r="24" fill="#EAF5EF"/>
  <text x="120" y="302" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="160" y="292" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">我做了什麼</text>
  <text x="160" y="334" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">買進、繼續扣、調整金額，還是先不動</text>

  <rect x="72" y="410" width="616" height="162" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="120" cy="462" r="24" fill="#EAF5EF"/>
  <text x="120" y="470" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="160" y="460" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">我為什麼這樣做</text>
  <text x="160" y="502" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">留下當時的白話理由，</text>
  <text x="160" y="538" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">不要只剩下後來的賺賠印象</text>

  <rect x="72" y="602" width="616" height="150" rx="26" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="120" cy="652" r="24" fill="#EAF5EF"/>
  <text x="120" y="660" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="160" y="650" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">我何時再回頭看</text>
  <text x="160" y="692" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">先寫下一個時間點或條件，</text>
  <text x="160" y="728" fill="#4A3F37" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">別每次都在波動當下臨時重想</text>

  <rect x="72" y="786" width="616" height="66" rx="24" fill="#FFF3DD" stroke="#E8DCC9" stroke-width="2"/>
  <text x="380" y="828" text-anchor="middle" fill="#9A6827" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">有紀錄，不是為了完美，而是為了下次不再亂掉。</text>
</svg>
