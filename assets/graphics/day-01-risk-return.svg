<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">風險與報酬關係圖</title>
  <desc id="desc">用較大字的圖示說明風險越高，通常報酬期待也越高。</desc>
  <rect width="1200" height="860" rx="36" fill="#FFF9F2"/>

  <g transform="translate(86 110)">
    <path d="M0 520H760" stroke="#B9A58C" stroke-width="6" stroke-linecap="round"/>
    <path d="M0 520V40" stroke="#B9A58C" stroke-width="6" stroke-linecap="round"/>
    <path d="M760 520L728 500V540L760 520Z" fill="#B9A58C"/>
    <path d="M0 40L-20 72H20L0 40Z" fill="#B9A58C"/>
    <text x="786" y="530" fill="#6B5C50" font-size="34" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">風險</text>
    <text x="0" y="0" fill="#6B5C50" font-size="34" font-weight="700" font-family="Inter, Noto Sans TC, sans-serif">報酬期待</text>

    <path d="M86 438C252 342 398 230 654 108" stroke="#2C8C67" stroke-width="16" stroke-linecap="round"/>

    <circle cx="196" cy="366" r="24" fill="#F0B862"/>
    <text x="236" y="374" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">較低波動</text>
    <text x="236" y="420" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">通常報酬期待也較保守</text>

    <circle cx="456" cy="234" r="24" fill="#2C8C67"/>
    <text x="496" y="242" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">中間區域</text>
    <text x="496" y="288" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">多數人真正該找的是適合自己的位置</text>

    <circle cx="654" cy="108" r="24" fill="#BE6A3C"/>
    <text x="694" y="116" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">較高波動</text>
    <text x="694" y="162" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">可能有更高期待，也更考驗承受力</text>
  </g>

  <g transform="translate(866 156)">
    <rect width="246" height="360" rx="30" fill="#FFFFFF" stroke="#E7D8C5" stroke-width="2"/>
    <text x="32" y="70" fill="#231B16" font-size="34" font-weight="800" font-family="Inter, Noto Sans TC, sans-serif">新手先記住</text>
    <text x="32" y="144" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">• 不要只看誰漲得快</text>
    <text x="32" y="206" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">• 先看自己能不能</text>
    <text x="32" y="246" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">  承受中間下跌</text>
    <text x="32" y="318" fill="#5E5148" font-size="28" font-family="Inter, Noto Sans TC, sans-serif">• 撐得住，才做得久</text>
  </g>

  <rect x="86" y="716" width="1026" height="90" rx="28" fill="#FFFDF9" stroke="#E7D8C5" stroke-width="2"/>
  <text x="132" y="772" fill="#6C5D52" font-size="32" font-family="Inter, Noto Sans TC, sans-serif">真正重要的不是衝到最高，而是找到你能安心持有、長期做得下去的區間。</text>
</svg>