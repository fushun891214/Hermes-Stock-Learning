<svg width="1180" height="560" viewBox="0 0 1180 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">投資檢查先分成三種節奏</title>
  <desc id="desc">桌機版圖卡，說明新手可用日常確認、固定回看、事件檢查三種節奏管理投資檢查。</desc>
  <rect width="1180" height="560" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="1124" height="504" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="82" y="70" width="210" height="38" rx="19" fill="#D9EFE4"/>
  <text x="187" y="95" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先分節奏，再做判斷</text>
  <text x="82" y="154" fill="#231B16" font-size="34" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">投資檢查先分成三種：日常確認、固定回看、事件檢查</text>

  <rect x="82" y="214" width="286" height="196" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="126" cy="258" r="22" fill="#EAF5EF"/>
  <text x="126" y="265" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="162" y="262" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">日常看一眼</text>
  <text x="106" y="314" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 確認扣款、下單或設定是否正常</text>
  <text x="106" y="352" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 先不要因為小波動就改計畫</text>

  <rect x="447" y="214" width="286" height="196" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="491" cy="258" r="22" fill="#EAF5EF"/>
  <text x="491" y="265" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="527" y="262" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">固定回看</text>
  <text x="471" y="314" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 每月或每季重看資金、商品與規則</text>
  <text x="471" y="352" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 重點是整理方向，不是追每天漲跌</text>

  <rect x="812" y="214" width="286" height="196" rx="28" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="856" cy="258" r="22" fill="#EAF5EF"/>
  <text x="856" y="265" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="892" y="262" fill="#231B16" font-size="26" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">事件檢查</text>
  <text x="836" y="314" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 只在條件真的改變時臨時回頭看</text>
  <text x="836" y="352" fill="#4A3F37" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 例如資金用途、商品理解或大動作</text>

  <path d="M380 312H425" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M745 312H790" stroke="#D3B58A" stroke-width="8" stroke-linecap="round"/>
  <path d="M409 298L427 312L409 326" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M774 298L792 312L774 326" stroke="#D3B58A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="82" y="448" width="1016" height="42" rx="21" fill="#EAF5EF"/>
  <text x="590" y="476" text-anchor="middle" fill="#1F6C4E" font-size="22" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先把檢查分成不同節奏，你才不會每次看見波動，就以為自己一定要立刻做大改動。</text>
</svg>
