<svg width="760" height="980" viewBox="0 0 760 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">下跌後先判斷再加碼</title>
  <desc id="desc">用三步驟說明新手面對下跌時，應先看資金、商品與規則，再決定要不要加碼。</desc>
  <rect width="760" height="980" rx="36" fill="#FFF8F1"/>
  <rect x="28" y="28" width="704" height="924" rx="30" fill="#FFFCF8" stroke="#E8DCC9" stroke-width="2"/>

  <rect x="72" y="70" width="180" height="38" rx="19" fill="#E2F2EA"/>
  <text x="162" y="95" text-anchor="middle" fill="#2C8C67" font-size="20" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">先別急著補</text>
  <text x="72" y="156" fill="#231B16" font-size="36" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">市場下跌時，先做這三步</text>
  <text x="72" y="204" fill="#6B5A47" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">先把判斷拉回資金、商品與規則，再決定要不要加碼。</text>

  <rect x="72" y="258" width="616" height="176" rx="30" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="126" cy="316" r="28" fill="#FFF3DD"/>
  <text x="126" y="325" text-anchor="middle" fill="#9A6827" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">1</text>
  <text x="172" y="314" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">先看這筆錢能不能承受波動</text>
  <text x="172" y="358" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不是生活費，也不是短期會用到的錢</text>
  <text x="172" y="396" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 就算再跌，你也不會立刻被迫退出</text>

  <text x="380" y="484" text-anchor="middle" fill="#C7B190" font-size="48" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">↓</text>

  <rect x="72" y="522" width="616" height="176" rx="30" fill="#FFFFFF" stroke="#E8DCC9" stroke-width="2"/>
  <circle cx="126" cy="580" r="28" fill="#E2F2EA"/>
  <text x="126" y="589" text-anchor="middle" fill="#2C8C67" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">2</text>
  <text x="172" y="578" fill="#231B16" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">再看商品你還講不講得清楚</text>
  <text x="172" y="622" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 你知道它在投什麼、波動從哪裡來</text>
  <text x="172" y="660" fill="#4A3F37" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">• 不是因為帳面難看，才臨時想多買一筆</text>

  <text x="380" y="748" text-anchor="middle" fill="#C7B190" font-size="48" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="700">↓</text>

  <rect x="72" y="786" width="616" height="116" rx="30" fill="#EAF5EF" stroke="#CFE7DA" stroke-width="2"/>
  <circle cx="126" cy="844" r="28" fill="#D9EFE4"/>
  <text x="126" y="853" text-anchor="middle" fill="#1F6C4E" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">3</text>
  <text x="172" y="840" fill="#1F6C4E" font-size="28" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" font-weight="800">最後才看：這次加碼有沒有在規則裡</text>
  <text x="172" y="880" fill="#315649" font-size="23" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">沒有邊界的補單，通常只是情緒攤平。</text>
</svg>
