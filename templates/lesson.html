<article class="lesson-shell">
  <section class="lesson-hero card soft-card">
    <div class="lesson-hero-meta">
      <span class="eyebrow-pill">第 {{day}} 天</span>
      <span class="reading-pill">慢慢學就好</span>
    </div>
    <h1>{{title}}</h1>
    <p class="lesson-intro">今天只要理解一個主題、做一個小思考，不用急著把所有投資知識一次學完。</p>
  </section>

  <div class="lesson-layout">
    <aside class="lesson-sidebar card">
      <div class="sidebar-block">
        <span class="mini-title">今日節奏</span>
        <ul class="sidebar-list">
          <li>先讀完今天重點</li>
          <li>用自己的話重述一次</li>
          <li>完成底下小任務</li>
        </ul>
      </div>
      <div class="sidebar-block">
        <span class="mini-title">學習提醒</span>
        <p>不求一次懂完，只求今天比昨天更清楚一點。</p>
      </div>
      <div class="sidebar-block">
        <span class="mini-title">課程導覽</span>
        <div class="lesson-nav vertical">
          {{prev_link}}
          {{next_link}}
        </div>
      </div>
    </aside>

    <section class="card lesson-card warm-lesson-card">
      <div class="lesson-body">
        {{body}}
      </div>
    </section>
  </div>
</article>
